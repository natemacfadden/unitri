name: CI

# Build the counter (C kernel + Cython binding) and run the CYTools-free
# regression tests on every push and PR. The TOPCOM cross-checks
# (tests/test_topcom_convex.py, tests/check_topcom.py) need CYTools and are not
# run here; test_symmetry.py runs but skips its TOPCOM sub-checks when CYTools
# is absent.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff + mypy
        run: pip install ruff mypy
      - name: Run ruff
        run: ruff check .
      - name: Run mypy
        run: mypy

  test:
    name: Build + test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install libgmp
        run: sudo apt-get update && sudo apt-get install -y libgmp-dev
      - name: Smoke-compile the default (mod-prime) backend
        run: gcc -O2 -Wall -Wextra -o /tmp/na-query-default unitri/na-query.c
      - name: Build the Cython / GMP extension
        run: pip install -e . pytest
      - name: Run the test suite
        # CYTools is absent here, so test_topcom_convex is skipped and
        # test_symmetry skips its TOPCOM sub-checks; the counting,
        # reflection- and unimodular-invariance regressions still run
        run: pytest tests/ -v
      - name: Smoke-run the benchmark
        # CYTools is absent here, so this only times na_query (no TOPCOM); it
        # just confirms benchmark.py -- the README's reproduce command -- still
        # runs end to end.
        run: python benchmarks/benchmark.py
